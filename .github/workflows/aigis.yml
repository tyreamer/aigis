# Example GitHub Actions workflow for Aigis
#
# Copy this file to your repo's .github/workflows/ directory.
# Aigis will scan your Python code on every push and PR.

name: Aigis Governance Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  aigis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Aigis
        run: pip install git+https://github.com/YOUR_ORG/aigis.git

      - name: Run Aigis scan
        run: aigis scan . -f sarif -o results.sarif

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: aigis

      # Optional: fail only on new findings using a baseline
      # - name: Run Aigis with baseline
      #   run: aigis scan . --baseline .aigis-baseline.json
